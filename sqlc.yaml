version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infra/repository/postgres/queries"
    schema: "internal/infra/repository/postgres/schema"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/infra/repository/postgres/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false